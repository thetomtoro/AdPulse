apiVersion: apps/v1
kind: Deployment
metadata:
  name: adpulse-consumers
  labels:
    app: adpulse
    component: consumers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adpulse
      component: consumers
  template:
    metadata:
      labels:
        app: adpulse
        component: consumers
    spec:
      containers:
        - name: consumers
          image: adpulse:latest
          command: ["node", "dist/consumers/index.js"]
          env:
            - name: NODE_ENV
              value: production
            - name: USE_MEMORY_DB
              value: "false"
            - name: USE_MEMORY_CACHE
              value: "false"
            - name: USE_MEMORY_QUEUE
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: adpulse-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: adpulse-secrets
                  key: redis-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: adpulse-config
                  key: kafka-brokers
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
