apiVersion: apps/v1
kind: Deployment
metadata:
  name: adpulse-api
  labels:
    app: adpulse
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: adpulse
      component: api
  template:
    metadata:
      labels:
        app: adpulse
        component: api
    spec:
      containers:
        - name: api
          image: adpulse:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: USE_MEMORY_DB
              value: "false"
            - name: USE_MEMORY_CACHE
              value: "false"
            - name: USE_MEMORY_QUEUE
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: adpulse-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: adpulse-secrets
                  key: redis-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: adpulse-config
                  key: kafka-brokers
            - name: TRACKING_SECRET
              valueFrom:
                secretKeyRef:
                  name: adpulse-secrets
                  key: tracking-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: adpulse-api
  labels:
    app: adpulse
    component: api
spec:
  selector:
    app: adpulse
    component: api
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
